APP_NAME=Breast Cancer Mutation Predictor
APP_VERSION=1.0.0
APP_AUTHOR=Research Team

DATA_SOURCES=tcga,cbioportal,ncbi
DEFAULT_DATA_DIR=data/raw
PROCESSED_DATA_DIR=data/processed
MODEL_DIR=models

TCGA_API_URL=https://api.gdc.cancer.gov
CBIOPORTAL_API_URL=https://www.cbioportal.org/api

ML_ALGORITHMS=random_forest,svm,logistic_regression,xgboost,neural_network
DEFAULT_ALGORITHM=random_forest

FEATURE_TYPES=mutation_presence,mutation_count,gene_expression,functional_impact
TARGET_GENES=BRCA1,BRCA2,TP53,PIK3CA,PTEN,CDH1,GATA3,MAP3K1,TBX3,FOXA1

CROSS_VALIDATION_FOLDS=5
TEST_SIZE=0.2
RANDOM_STATE=42
